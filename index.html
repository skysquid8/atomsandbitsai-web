  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background: #000;
      color: #e0e0e0;

    }

    .tagline {

      color: #999;
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: #2ecc71;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .cta:hover { background: #27ae60; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.85rem;
      color: #555;
    }
