<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atoms & Bits AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    h1 span {
      color: #2ecc71;
    }

    .tagline {
      font-size: 1.25rem;
      color: #999;
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: #2ecc71;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .cta:hover { background: #27ae60; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <img src="assets/logo.png" alt="Atoms &amp; Bits AI" class="logo">
  <h1>Atoms <span>&amp;</span> Bits AI</h1>
  <p class="tagline">Where the physical world meets intelligent systems. We build AI solutions grounded in real-world science.</p>
  <a href="mailto:hello@atomsandbitsai.com" class="cta">Get in Touch</a>
  <footer>&copy; 2026 Atoms &amp; Bits AI. All rights reserved.</footer>
</body>
</html>
